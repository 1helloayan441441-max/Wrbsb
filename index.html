<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYANV6-MD | Premium WhatsApp Bot Panel</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #090d16; 
            --card-bg: rgba(17, 24, 39, 0.7); 
            --primary: #00f2fe; 
            --secondary: #4facfe; 
            --accent: #9b51e0;
            --text: #f3f4f6; 
            --muted: #6b7280; 
            --border: rgba(255, 255, 255, 0.08); 
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, rgba(79, 172, 254, 0.15) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Modern Glassmorphism Navbar */
        .navbar { 
            background: rgba(9, 13, 22, 0.8); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); 
            padding: 18px 0; 
        }
        .navbar-brand { 
            font-weight: 800; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.6rem; 
            letter-spacing: -0.5px;
        }

        /* WhatsApp Channel Button (Footer) */
        .btn-whatsapp-channel {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: #ffffff !important;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        .btn-whatsapp-channel:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.5);
            color: #ffffff;
        }

        /* Premium Counter Cards */
        .stats-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .stats-card { 
            flex: 1; 
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(79, 172, 254, 0.05)); 
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 16px; 
            padding: 24px; 
            text-align: center; 
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .stats-card h3 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            margin-bottom: 5px;
        }
        .stats-card p {
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            color: var(--primary);
            font-weight: 600;
        }

        /* Input Cards and Panels */
        .post-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 25px; 
            backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .post-card:hover { 
            border-color: rgba(0, 242, 254, 0.3); 
            box-shadow: 0 12px 40px rgba(0, 242, 254, 0.1);
        }

        /* Styled Form Inputs */
        .form-control {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid var(--border) !important;
            color: #ffffff !important;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.15) !important;
            border-color: var(--primary) !important;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        /* Futuristic Neon Buttons */
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; 
            color: #090d16;
            font-weight: 700; 
            border-radius: 12px; 
            padding: 12px 24px; 
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) { 
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            color: #090d16;
        }
        .btn-primary:disabled {
            background: var(--muted);
            box-shadow: none;
        }
        .btn-danger { 
            background: rgba(239, 68, 68, 0.1); 
            border: 1px solid rgba(239, 68, 68, 0.4); 
            color: #ef4444;
            border-radius: 12px; 
            padding: 8px 18px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        /* Hacker Style Live Console */
        .console-body { 
            background: #05070f; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px; 
            height: 280px; 
            overflow-y: auto; 
            padding: 20px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 13px; 
            color: #38bdf8; 
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }
        
        .hidden { display: none !important; }
        
        /* Dynamic Status Badges */
        .status-badge { 
            padding: 6px 16px; 
            border-radius: 30px; 
            font-weight: 700; 
            font-size: 11px; 
            letter-spacing: 1px;
            display: inline-block;
        }
        .connected { 
            background: rgba(16, 185, 129, 0.1); 
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }
        .disconnected { 
            background: rgba(239, 68, 68, 0.1); 
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }
        
        /* Layout fix to prevent Screen Shake */
        .dynamic-area {
            min-height: 95px; /* Fix height so card doesn't expand/shrink */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Smooth Neon Progress Bar */
        .progress-container { width: 100%; background-color: rgba(255,255,255,0.05); border-radius: 20px; display: none; padding: 3px; border: 1px solid var(--border); }
        .progress-bar { width: 0%; height: 8px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 20px; transition: width 0.4s ease; box-shadow: 0 0 10px var(--primary); }
        .loading-text { font-size: 13px; color: var(--muted); margin-top: 10px; text-align: center; font-weight: 500; }
        
        #pairingResult {
            font-weight: 700;
            letter-spacing: 2px;
            background: rgba(255, 193, 7, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #ffc107;
            display: block;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-bolt me-2"></i>AYANV6-BOT-PENNAL</a>
        </div>
    </nav>

    <div class="container" style="flex: 1;">
        <!-- Stats Row -->
        <div class="stats-container">
            <div class="stats-card">
                <h3 id="totalUsers">0</h3>
                <p class="mb-0">TOTAL USERS</p>
            </div>
            <div class="stats-card">
                <h3 id="totalActive">0</h3>
                <p class="mb-0">ACTIVE BOTS</p>
            </div>
        </div>

        <!-- Create Bot Section -->
        <div id="setupSection">
            <div class="post-card">
                <h5 class="mb-4 fw-bold"><i class="fas fa-plus-circle text-info me-2"></i>DEPLOY NEW INSTANCE</h5>
                <div class="row g-3">
                    <div class="col-md-9">
                        <input type="text" id="userIdInput" class="form-control" placeholder="Enter Unique Bot Name (e.g., AyanBot_01)">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="selectUser()">INITIALIZE</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Control Dashboard -->
        <div id="userDashboard" class="hidden">
            <div id="stage1">
                <div class="post-card">
                    <h5 class="mb-4 fw-bold"><i class="fas fa-key text-warning me-2"></i>AUTHENTICATION DEVICE</h5>
                    <div class="mb-4">
                        <label class="form-label">WhatsApp Number (Include Country Code)</label>
                        <input type="tel" class="form-control" id="pairNumber" placeholder="e.g., 923001234567">
                    </div>
                    <button class="btn btn-primary w-100" id="pairBtn">REQUEST PAIRING CODE</button>
                    
                    <!-- Fixed Height Area to Prevent Screen Shake -->
                    <div class="dynamic-area mt-4">
                        <!-- Progress Bar -->
                        <div id="progressContainer" class="progress-container">
                            <div id="progressBar" class="progress-bar"></div>
                            <div class="loading-text"><i class="fas fa-spinner fa-spin me-2"></i>Establishing Secure Handshake... Please wait.</div>
                        </div>

                        <!-- Result Box -->
                        <div id="pairingResultSection" class="hidden">
                            <div id="pairingResult" class="text-warning"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stage 2: Console Log -->
            <div id="stage2" class="hidden">
                <div class="post-card d-flex justify-content-between align-items-center py-3">
                    <div>
                        <span id="connectionStatus" class="status-badge disconnected">DISCONNECTED</span>
                        <span class="ms-3 fw-bold" id="activeBotName" style="color: rgba(255,255,255,0.9);"></span>
                    </div>
                    <button class="btn btn-danger btn-sm" id="logoutBtn"><i class="fas fa-power-off me-2"></i>TERMINATE</button>
                </div>
                <div class="post-card">
                    <h5 class="mb-3 fw-bold"><i class="fas fa-terminal text-success me-2"></i>SYSTEM LOGS</h5>
                    <div class="console-body" id="console"></div>
                </div>
            </div>
        </div>

        <!-- Footer WhatsApp Button -->
        <div class="text-center mt-3 mb-5">
            <a href="https://whatsapp.com/channel/0029Vb1snfA4NVicrPnm7L1m" target="_blank" class="btn-whatsapp-channel">
                <i class="fab fa-whatsapp fs-4"></i> Join Official WhatsApp Channel
            </a>
        </div>
    </div>

    <!-- JavaScript Base Logic (Do NOT Touch) -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentUserId = null;

        function selectUser() {
            const userId = document.getElementById('userIdInput').value.trim();
            if (!userId) return alert('Enter a bot name');
            currentUserId = userId;
            socket.emit('set-user', userId);
            document.getElementById('activeBotName').innerText = "Active Process: " + userId;
            document.getElementById('userDashboard').classList.remove('hidden');
            document.getElementById('stage1').classList.remove('hidden');
            document.getElementById('stage2').classList.add('hidden');
        }

        socket.on('total-active', (count) => {
            document.getElementById('totalActive').innerText = count;
        });

        socket.on('total-users', (count) => {
            document.getElementById('totalUsers').innerText = count;
        });

        socket.on('pairing-code', (code) => {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('pairingResultSection').classList.remove('hidden');
            document.getElementById('pairingResult').innerHTML = `<i class="fas fa-shield-alt me-2"></i>PAIRING CODE: <b style="font-size: 1.6rem; color:#fff; text-shadow:0 0 8px #ffc107;">${code}</b>`;
        });

        socket.on('console', (log) => {
            const consoleDiv = document.getElementById('console');
            const entry = document.createElement('div');
            entry.style.marginBottom = "4px";
            entry.innerHTML = `<span style="color: #6b7280;">[${log.timestamp}]</span> <span style="color: #10b981;">➔</span> ${log.message}`;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        });

        socket.on('connection-status', (status) => {
            const badge = document.getElementById('connectionStatus');
            if (status.connected) {
                badge.className = 'status-badge connected';
                badge.innerText = 'CONNECTED';
                document.getElementById('stage1').classList.add('hidden');
                document.getElementById('stage2').classList.remove('hidden');
                document.getElementById('progressContainer').style.display = 'none';
            } else {
                badge.className = 'status-badge disconnected';
                badge.innerText = 'DISCONNECTED';
            }
        });

        let isPairing = false;
        document.getElementById('pairBtn').onclick = () => {
            if (isPairing) return;
            const number = document.getElementById('pairNumber').value;
            if (!number) return alert('Enter number');
            
            isPairing = true;
            document.getElementById('pairBtn').disabled = true;
            
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            
            document.getElementById('pairingResultSection').classList.add('hidden');
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 90) {
                    clearInterval(interval);
                } else {
                    width += 2;
                    progressBar.style.width = width + '%';
                }
            }, 100);

            socket.emit('pair-request', { userId: currentUserId, number });
            
            setTimeout(() => {
                isPairing = false;
                document.getElementById('pairBtn').disabled = false;
            }, 10000);
        };

        document.getElementById('logoutBtn').onclick = () => {
            socket.emit('logout', currentUserId);
        };
    </script>
</body>
</html>
